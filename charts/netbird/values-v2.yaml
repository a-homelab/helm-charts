# yaml-language-server: $schema=../common/schema/values.schema.json
# Migration values for the new common library; verified manifest-equivalent
# by scripts/verify-common-migration.py.
# Env/args values like $NETBIRD_* are literal strings substituted at
# container runtime, not Helm templates.
components:
  management:
    container:
      name: '{{ include "common.fullname" . }}-management'
      image:
        repository: netbirdio/management
      args:
        - --port
        - "33073"
        - --log-file
        - console
        - --log-level
        - info
        - --disable-anonymous-metrics=true
        - --single-account-mode-domain=$NETBIRD_MGMT_SINGLE_ACCOUNT_MODE_DOMAIN
        - --dns-domain
        - netbird.selfhosted
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      ports:
        http:
          port: 33073
          appProtocol: http2
    pod:
      securityContext:
        fsGroup: 1000

  signal:
    container:
      name: '{{ include "common.fullname" . }}-signal'
      image:
        repository: netbirdio/signal
      args:
        - --port
        - "10000"
        - --log-file
        - console
        - --log-level
        - info
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      ports:
        grpc:
          port: 10000
          appProtocol: grpc
    pod:
      securityContext:
        fsGroup: 65532

  relay:
    container:
      name: '{{ include "common.fullname" . }}-relay'
      image:
        repository: netbirdio/relay
      env:
        NB_LOG_LEVEL: info
        NB_LISTEN_ADDRESS: ":33080"
        NB_EXPOSED_ADDRESS: rel://$NETBIRD_RELAY_DOMAIN:$NETBIRD_RELAY_PORT
        NB_AUTH_SECRET:
          valueFrom:
            secretKeyRef:
              name: netbird-relay-auth-secret
              key: secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      ports:
        http:
          port: 33080
    pod:
      securityContext:
        fsGroup: 65532

  dashboard:
    container:
      name: '{{ include "common.fullname" . }}-dashboard'
      image:
        repository: netbirdio/dashboard
        tag: "v2.33.0"
      env:
        NETBIRD_MGMT_API_ENDPOINT: $NETBIRD_MGMT_API_ENDPOINT
        NETBIRD_MGMT_GRPC_API_ENDPOINT: $NETBIRD_MGMT_API_ENDPOINT
        AUTH_AUDIENCE: $NETBIRD_DASH_AUTH_AUDIENCE
        AUTH_CLIENT_ID: $NETBIRD_AUTH_CLIENT_ID
        AUTH_CLIENT_SECRET: $NETBIRD_AUTH_CLIENT_SECRET
        AUTH_AUTHORITY: $NETBIRD_AUTH_AUTHORITY
        USE_AUTH0: $NETBIRD_USE_AUTH0
        AUTH_SUPPORTED_SCOPES: $NETBIRD_AUTH_SUPPORTED_SCOPES
        AUTH_REDIRECT_URI: $NETBIRD_AUTH_REDIRECT_URI
        AUTH_SILENT_REDIRECT_URI: $NETBIRD_AUTH_SILENT_REDIRECT_URI
        NETBIRD_TOKEN_SOURCE: $NETBIRD_TOKEN_SOURCE
        NGINX_SSL_PORT: "443"
        LETSENCRYPT_DOMAIN: $NETBIRD_LETSENCRYPT_DOMAIN
        LETSENCRYPT_EMAIL: $NETBIRD_LETSENCRYPT_EMAIL
      ports:
        http:
          port: 80
