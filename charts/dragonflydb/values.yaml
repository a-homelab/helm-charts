replicaCount: 1

image:
  repository: docker.dragonflydb.io/dragonflydb/dragonfly
  pullPolicy: IfNotPresent
  tag: "v1.37.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Used as certificate common name and db username
clientName: null

args: []

env: []

tls:
  enabled: false

auth:
  enabled: false
  
  # Valid values are `password`, `tls`
  # https://www.dragonflydb.io/docs/managing-dragonfly/operator/authentication
  mode: password

  # The chart will auto-generate a password using external-secrets.
  password:
    # Key to use inside the k8s secret
    secretKey: password

    # Use this option to use an existing k8s secret instead of the auto-generated one.
    existingSecret: {}
      # name: my-existing-secret
      # key: my-secret-key

  # Name of existing secret containing CA certificate files that will
  # be checked during client authentication
  # clientCaCertSecret:
  #   name: my-tls-secret

snapshot: {}
  # cron: "*/5 * * * *"
  # persistentVolumeClaimSpec:
  #   accessModes:
  #     - ReadWriteOnce
  #   resources:
  #     requests:
  #       storage: 10Gi
  #   storageClassName: rook-ceph-block-ssd

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Common labels for all resources
labels: {}

# Common annotations for all resources
annotations: {}

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

affinity: {}

tolerations: []

topologySpreadConstraints:
  # If `labelSelector` is empty or not provided, the chart will default to the selector labels
  - topologyKey: kubernetes.io/hostname
    maxSkew: 1
    minDomains: 2
    whenUnsatisfiable: DoNotSchedule
    nodeTaintsPolicy: Honor
  - topologyKey: topology.kubernetes.io/zone
    maxSkew: 2
    whenUnsatisfiable: ScheduleAnyway
    nodeTaintsPolicy: Honor

externalSecrets:
  # Whether to push secrets to external secrets manager or not
  push:
    enabled: true

certificateIssuerRef:
  name: apps-ca-issuer
  kind: ClusterIssuer
