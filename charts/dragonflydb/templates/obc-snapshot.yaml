{{- if and .Values.snapshot.enabled (eq .Values.snapshot.type "s3") }}
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: "{{ include "dragonflydb.fullname" . }}-snapshots"
  namespace: {{ .Release.Namespace | quote }}
spec:
  bucketName: "{{ include "dragonflydb.fullname" . }}-snapshots"
  storageClassName: {{ .Values.snapshot.s3.storageClassName | quote }}
  additionalConfig:
    maxSize: {{ .Values.snapshot.s3.maxSize | quote }}
    bucketLifecycle: |
      {
        "Rules": [
          {
            "ID": "ExpireAfter30Days",
            "Status": "Enabled",
            "Prefix": "",
            "Expiration": {
              "Days": {{ .Values.snapshot.s3.retentionDays | int }}
            }
          }
        ]
      }
{{- end }}
