# Exercises the multi-component fixture. Raw document order (components
# sorted, then per-component: controller, PVCs, Service, HTTPRoute, SA,
# HPA, PDB; then extras):
#   0: api Deployment       1: api Service      2: api HTTPRoute
#   3: api ServiceAccount   4: api HPA          5: api PDB
#   6: nightly-report CronJob
#   7: worker Deployment    8: worker ServiceAccount
#   9: ConfigMap           10: ExternalSecret  11: Widget (rawResource)
suite: multi-component resolution and inheritance
templates:
  - templates/all.yaml
release:
  name: t
  namespace: test
values:
  - ../ci/multi-component-values.yaml
tests:
  - it: renders the full multi-component resource set
    asserts:
      - hasDocuments:
          count: 12
      - isKind:
          of: Deployment
        documentIndex: 0
      - isKind:
          of: CronJob
        documentIndex: 6
      - isKind:
          of: Deployment
        documentIndex: 7

  - it: suffixes non-main component resource names
    asserts:
      - equal:
          path: metadata.name
          value: t-common-tests-api
        documentIndex: 0
      - equal:
          path: metadata.name
          value: t-common-tests-worker
        documentIndex: 7

  - it: inherits shared defaults into every component
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
        documentIndex: 0
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
        documentIndex: 7
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 50m
        documentIndex: 7

  - it: deletes an inherited env entry only in the component that nulled it
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEPRECATED
            value: to-be-deleted
        documentIndex: 0
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: DEPRECATED
            value: to-be-deleted
        documentIndex: 6

  - it: renders sidecars after the main container without inheriting its ports or resources
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: api
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[1].name
          value: oauth-proxy
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[1].image
          value: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        documentIndex: 0
      - notExists:
          path: spec.template.spec.containers[1].resources
        documentIndex: 0

  - it: inherits the main image into initContainers
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: 10-migrate
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: ghcr.io/example/app:1.0.0
        documentIndex: 0

  - it: targets mounts at specific containers
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/app
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            name: config
            mountPath: /etc/proxy
            readOnly: true
        documentIndex: 0

  - it: omits replicas when hpa is enabled and targets the right controller
    asserts:
      - notExists:
          path: spec.replicas
        documentIndex: 0
      - equal:
          path: spec.scaleTargetRef.name
          value: t-common-tests-api
        documentIndex: 4
      - equal:
          path: spec.minReplicas
          value: 2
        documentIndex: 4
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 80
        documentIndex: 4

  - it: deletes the worker service via null and keeps explicit replicas
    asserts:
      - equal:
          path: spec.replicas
          value: 2
        documentIndex: 7
      - isKind:
          of: ServiceAccount
        documentIndex: 8

  - it: scopes the pdb selector to the component
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: api
        documentIndex: 5
      - equal:
          path: spec.minAvailable
          value: 1
        documentIndex: 5

  - it: uses the default service account when disabled
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: default
        documentIndex: 6

  - it: renders extras with standard labels and no component label
    asserts:
      - equal:
          path: metadata.name
          value: t-common-tests-app-config
        documentIndex: 9
      - equal:
          path: metadata.labels.team
          value: platform
        documentIndex: 9
      - notExists:
          path: metadata.labels["app.kubernetes.io/component"]
        documentIndex: 9
      - equal:
          path: spec.secretStoreRef.name
          value: default-store
        documentIndex: 10
      - equal:
          path: spec.target.name
          value: t-common-tests-api-key
        documentIndex: 10
      - isKind:
          of: Widget
        documentIndex: 11
      - equal:
          path: spec.size
          value: 3
        documentIndex: 11
