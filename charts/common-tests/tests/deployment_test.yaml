suite: deployment basics (implicit main component)
templates:
  - templates/all.yaml
release:
  name: t
  namespace: test
tests:
  - it: renders the expected resource set from minimal values
    asserts:
      - hasDocuments:
          count: 5
      - isKind:
          of: Deployment
        documentIndex: 0
      - isKind:
          of: PersistentVolumeClaim
        documentIndex: 1
      - isKind:
          of: Service
        documentIndex: 2
      - isKind:
          of: HTTPRoute
        documentIndex: 3
      - isKind:
          of: ServiceAccount
        documentIndex: 4

  - it: names main-component resources with the bare fullname
    asserts:
      - equal:
          path: metadata.name
          value: t-common-tests
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: test
        documentIndex: 0

  - it: image tag defaults to the chart appVersion
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: lscr.io/linuxserver/sonarr:1.0.0
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
        documentIndex: 0

  - it: renders a digest tag with the @ separator
    set:
      components.main.container.image.tag: "sha256:abc123"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: lscr.io/linuxserver/sonarr@sha256:abc123
        documentIndex: 0

  - it: applies deployment-kind settings and library defaults
    asserts:
      - equal:
          path: spec.replicas
          value: 1
        documentIndex: 0
      - equal:
          path: spec.strategy.type
          value: Recreate
        documentIndex: 0
      - notExists:
          path: spec.revisionHistoryLimit
        documentIndex: 0
      - equal:
          path: spec.template.spec.enableServiceLinks
          value: false
        documentIndex: 0
      - equal:
          path: spec.template.spec.serviceAccountName
          value: t-common-tests
        documentIndex: 0

  - it: propagates pod securityContext from values
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000
        documentIndex: 0

  - it: fails fast when an enabled component has no image repository
    set:
      components.main.container.image.repository: ""
    asserts:
      - failedTemplate:
          errorMessage: "common: components.main is enabled but container.image.repository is not set"

  - it: rejects mixing the reserved main component with named components
    set:
      components.api:
        container:
          image:
            repository: ghcr.io/example/app
    asserts:
      - failedTemplate:
          errorMessage: 'common: the component name "main" is reserved for single-component charts (it renders without a component selector label). Name every component explicitly in multi-component charts.'

  - it: renders a custom tpl-rendered container name
    set:
      components.main.container.name: "{{ include \"common.fullname\" . }}"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: t-common-tests
        documentIndex: 0

  - it: skips disabled components entirely
    set:
      components.main.enabled: false
    asserts:
      - hasDocuments:
          count: 0
