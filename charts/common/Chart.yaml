apiVersion: v2
name: common
description: |
  Component-oriented Helm library chart. Consumer charts declare named
  components (workloads), typed appResources and raw manifests entirely through values;
  a single `{{ include "common.all" . }}` renders every resource. Values
  resolve through a layered deep-merge (library defaults -> defaults ->
  component) with delete-by-null, map-shaped collections everywhere, and
  per-resource `overrides` escape hatches at container, pod, and resource
  altitude.
type: library
version: 1.0.0-alpha.1
kubeVersion: ">=1.26.0-0"
keywords:
  - common
  - library
