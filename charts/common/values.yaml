# yaml-language-server: $schema=schema/values.schema.json
# common — component-oriented library chart.
#
# This file documents the full values shape the library accepts. As a
# library chart it is never installed directly and these values are not
# applied at render time; consumer charts declare only their deltas.
#
# Structure — six top-level keys plus the familiar Helm naming overrides:
#   global:      injected platform context (never set by the app chart)
#   defaults:    component-shaped defaults merged under every component
#   components:  named workloads (empty -> one implicit component "main")
#   extras:      chart-scoped resources: extras.<type>.<name>
#   labels:      stamped on every rendered resource (pods included)
#   annotations: stamped on every rendered resource (pods excluded)
#
# Resolution per component: libraryDefaults <- defaults <- components.<name>
# (deep merge; explicit null DELETES the key at any depth).
#
# Collections are maps, not arrays: env, ports, volumes, mounts, sidecars,
# tolerations, parentRefs, ... Map keys give entries identity so overlays
# can add/override/delete (~) individual entries; rendering converts maps
# to deterministically ordered lists. Arrays remain only where order is
# semantic (command, args, httpRoute.rules) or for raw k8s passthrough
# (affinity, hpa.behavior).

# -----------------------------------------------------------------------------
# Chart identity & metadata
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
labels: {}
annotations: {}

# -----------------------------------------------------------------------------
# Platform-injected context
# -----------------------------------------------------------------------------
global:
  domain: ""              # default hostname base for httpRoutes: <name>.<domain>
  gateway:
    name: ""              # default HTTPRoute parentRef
    namespace: ""
  externalSecrets:
    storeName: ""         # default secretStoreRef name
    kind: ClusterSecretStore

# -----------------------------------------------------------------------------
# Defaults — component-shaped, merged under every component. Only put
# things here that make sense for ALL components (see components.main
# below for the full component shape).
# -----------------------------------------------------------------------------
defaults: {}
  # pod:
  #   securityContext:
  #     runAsNonRoot: true
  # container:
  #   resources:
  #     requests: { cpu: 50m, memory: 128Mi }

# -----------------------------------------------------------------------------
# Components. Empty -> one implicit component named "main". Declaring any
# component replaces the implicit main. The component named "main" renders
# resources as <fullname>; others as <fullname>-<name>.
# -----------------------------------------------------------------------------
components: {}
  # main:
  #   enabled: true
  #   kind: Deployment            # Deployment | StatefulSet | DaemonSet | CronJob | Job
  #   labels: {}                  # every resource of this component
  #   annotations: {}             # every resource except the pod template
  #
  #   container:                  # the primary container
  #     image:
  #       repository: ""          # REQUIRED (no default by design)
  #       tag: ""                 # default .Chart.AppVersion; "sha256:..." renders as digest
  #       pullPolicy: IfNotPresent
  #     command: []
  #     args: []
  #     workingDir: ""
  #     env: {}                   # map: string|number|bool -> value (tpl-rendered),
  #                               #      map -> {value|valueFrom}, ~ -> delete
  #     envFrom: {}               # map<id, {secretRef|configMapRef, prefix}>
  #     ports: {}                 # map<name, {port, protocol, expose, appProtocol}>
  #     probes: { liveness: {}, readiness: {}, startup: {} }   # raw k8s probes
  #     resources: {}
  #     securityContext: {}
  #     lifecycle: {}
  #     overrides: {}             # merged onto this container pre-assembly
  #
  #   sidecars: {}                # map<name, container shape>; image inherits main's
  #   initContainers: {}          # map<name, container shape>; sorted key order = run order
  #                               # (use numeric prefixes: 10-wait-db, 20-migrate);
  #                               # restartPolicy: Always = native sidecar
  #
  #   pod:
  #     labels: {}
  #     annotations: {}           # the ONLY way annotations reach pods
  #     securityContext: {}
  #     nodeSelector: {}
  #     tolerations: {}           # map w/ synthetic keys: gpu: {key: ..., operator: Exists}
  #     topologySpreadConstraints: {}   # map w/ synthetic keys
  #     affinity: {}              # raw k8s passthrough
  #     hostAliases: {}           # map<ip, {hostnames: [...]}>
  #     imagePullSecrets: {}      # map<secretName, {}>
  #     priorityClassName: ""
  #     runtimeClassName: ""
  #     schedulerName: ""
  #     hostNetwork: false
  #     enableServiceLinks: false
  #     dnsPolicy: ""
  #     dnsConfig: {}
  #     terminationGracePeriodSeconds: ~
  #     automountServiceAccountToken: ~
  #     volumes:                  # definition + mounts in one place
  #       {}
  #       # config:
  #       #   type: pvc           # pvc | existingClaim | configMap | secret |
  #       #                       # emptyDir | hostPath | nfs | custom
  #       #   size: 1Gi           # pvc: size (required), storageClass, accessModes
  #       #   mounts:             # map keyed by mount path
  #       #     /config: {}       # default target: the main container
  #       #     /shared: { containers: [sidecar], readOnly: true, subPath: x }
  #     overrides: {}             # merged onto the rendered PodTemplateSpec
  #
  #   deployment:                 # read only when kind: Deployment
  #     replicas: 1               # omitted when hpa.enabled
  #     strategy: {}
  #     revisionHistoryLimit: 10
  #   statefulset:
  #     replicas: 1
  #     serviceName: ""           # default: the component's Service
  #     podManagementPolicy: ""
  #     updateStrategy: {}
  #     volumeClaimTemplates: {}  # map<name, pvc shape incl. mounts>
  #   daemonset:
  #     updateStrategy: {}
  #   cronjob:
  #     schedule: ""              # REQUIRED when kind: CronJob
  #     timeZone: ""
  #     concurrencyPolicy: Forbid
  #     suspend: false
  #     successfulJobsHistoryLimit: 3
  #     failedJobsHistoryLimit: 1
  #   job:                        # kind: Job, and the jobTemplate of kind: CronJob
  #     restartPolicy: OnFailure
  #     backoffLimit: 6
  #     completions: ~
  #     parallelism: ~
  #     ttlSecondsAfterFinished: ~
  #
  #   overrides: {}               # merged onto the final controller manifest
  #
  #   service:
  #     enabled: true             # renders only if any container exposes ports
  #     type: ClusterIP
  #     ports: {}                 # override/prune (~) the ports derived from containers;
  #                               # service-side port = expose | port
  #     labels: {}
  #     annotations: {}
  #     overrides: {}
  #
  #   httpRoute:
  #     enabled: false
  #     hostnames: []             # tpl-rendered; default <name>.<global.domain>
  #     parentRefs: {}            # map<gatewayName, {namespace, sectionName}>;
  #                               # default: global.gateway
  #     rules: []                 # ordered array; default: one rule -> first service port;
  #                               # backendRefs default name/port
  #     labels: {}
  #     annotations: {}
  #     overrides: {}
  #
  #   hpa:
  #     enabled: false            # when enabled the controller omits replicas
  #     min: 1
  #     max: 3
  #     targetCPU: ~              # utilization % shortcut
  #     targetMemory: ~
  #     metrics: {}               # map<name, raw autoscaling/v2 metric spec>
  #     behavior: {}
  #     overrides: {}
  #
  #   pdb:
  #     enabled: false
  #     minAvailable: ~           # exactly one of minAvailable/maxUnavailable
  #     maxUnavailable: ~
  #     unhealthyPodEvictionPolicy: ""
  #     overrides: {}
  #
  #   serviceAccount:
  #     enabled: true             # false + name -> reference an existing SA
  #     name: ""
  #     automount: ~
  #     labels: {}
  #     annotations: {}
  #     overrides: {}

# -----------------------------------------------------------------------------
# Extras — chart-scoped resources, named <fullname>-<key>. Components
# reference them via volume `ref:` or env valueFrom.
# -----------------------------------------------------------------------------
extras: {}
  # configMap:
  #   config:
  #     tpl: false                # opt-in tpl rendering of data values
  #     data:
  #       config.yml: |
  #         ...
  # secret:
  #   creds:
  #     stringData: { user: admin }
  # externalSecret:
  #   api-key:
  #     storeRef: {}              # default: global.externalSecrets
  #     refreshInterval: 1h
  #     data:                     # map keyed by secretKey
  #       api-key:
  #         remoteRef: { key: my-remote-key }
  # pvc:
  #   media: { size: 100Gi, storageClass: nfs }
  # rawResource:
  #   my-crd:
  #     apiVersion: example.io/v1
  #     kind: Widget
  #     spec: { }                 # tpl-rendered; gets standard labels
